<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Quiniela Mundial 26 · Trionda</title>
<meta name="description" content="Quiniela diaria entre amigos para el Mundial 2026">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   QUINIELA MUNDIAL 26 — DESIGN TOKENS
   Paleta inspirada en el balón oficial "Adidas Trionda" (rojo/
   verde/azul de las tres sedes) sobre un fondo nocturno de
   estadio. Tipografía: Anton (scoreboard/marcador de estadio)
   + Inter (texto) + Space Mono (números, cuenta regresiva).
   ============================================================ */
:root{
  --navy-950:#080b14;
  --navy-900:#0d1220;
  --navy-800:#141b30;
  --navy-700:#1c2540;
  --navy-600:#283355;
  --line:#26304d;
  --ink-100:#f6f5f1;
  --ink-300:#c7cce0;
  --ink-500:#8891ad;
  --ink-600:#646e8f;
  --wave-red:#e8553a;
  --wave-red-dim:#7a3528;
  --wave-green:#2fa968;
  --wave-green-dim:#1f5e42;
  --wave-blue:#3672e0;
  --wave-blue-dim:#27406f;
  --gold:#f4b73f;
  --gold-dim:#8a6a2a;
  --font-display:'Anton', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'Space Mono', monospace;
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:26px;
  --shadow-deep:0 24px 60px -20px rgba(0,0,0,.55);
}
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--navy-950);
  color:var(--ink-100);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed; inset:0;
  background:
    radial-gradient(60% 50% at 15% 0%, rgba(54,114,224,.18), transparent 60%),
    radial-gradient(50% 45% at 100% 10%, rgba(232,85,58,.14), transparent 60%),
    radial-gradient(60% 40% at 50% 100%, rgba(47,169,104,.12), transparent 60%);
  pointer-events:none; z-index:0;
}
h1,h2,h3,.display{font-family:var(--font-display); letter-spacing:.01em; text-transform:uppercase; line-height:.95; font-weight:400;}
.mono{font-family:var(--font-mono)}
a{color:inherit}
button{font-family:inherit}
::selection{background:var(--wave-blue); color:#fff}
::-webkit-scrollbar{width:10px; height:10px}
::-webkit-scrollbar-thumb{background:var(--navy-600); border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important}
}

/* ---------- layout shells ---------- */
#app{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column}
.wrap{max-width:1080px; margin:0 auto; padding:0 20px; width:100%}
.hidden{display:none !important}

/* ---------- wave divider (signature motif) ---------- */
.wave-divider{display:block; width:100%; height:34px; margin:0; line-height:0}
.wave-divider svg{width:100%; height:100%; display:block}

/* ---------- hero ---------- */
.hero{position:relative; min-height:min(92vh,820px); display:flex; flex-direction:column; justify-content:center; overflow:hidden; border-bottom:1px solid var(--line)}
#hero-canvas{position:absolute; inset:0; width:100%; height:100%; z-index:0; opacity:0; transition:opacity 1.2s ease}
#hero-canvas.ready{opacity:1}
.hero-inner{position:relative; z-index:2; text-align:center; padding:120px 20px 64px}
.eyebrow{font-family:var(--font-mono); font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--gold); margin:0 0 18px}
.hero h1{font-size:clamp(48px,11vw,128px); margin:0; background:linear-gradient(92deg,var(--wave-red) 0%, var(--ink-100) 30%, var(--ink-100) 70%, var(--wave-blue) 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent}
.hero h1 small{display:block; font-size:.34em; color:var(--wave-green); -webkit-text-fill-color:var(--wave-green)}
.hero p.lede{max-width:540px; margin:22px auto 0; color:var(--ink-300); font-size:17px; line-height:1.55}
.hero-cta{margin-top:38px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap}
.hero-stats{position:relative; z-index:2; display:flex; gap:0; justify-content:center; flex-wrap:wrap; border-top:1px solid var(--line); margin-top:10px}
.hero-stat{flex:1 1 140px; max-width:200px; padding:22px 14px; text-align:center; border-right:1px solid var(--line)}
.hero-stat:last-child{border-right:none}
.hero-stat .n{font-family:var(--font-mono); font-size:30px; font-weight:700; color:var(--gold)}
.hero-stat .l{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-500); margin-top:4px}

/* ---------- buttons / inputs ---------- */
.btn{appearance:none; border:none; cursor:pointer; border-radius:999px; padding:14px 26px; font-weight:700; font-size:14px; letter-spacing:.02em; display:inline-flex; align-items:center; gap:8px; transition:transform .15s ease, box-shadow .15s ease, background .15s ease; white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(95deg,var(--wave-red),var(--wave-green) 55%,var(--wave-blue)); color:#fff; box-shadow:0 10px 30px -10px rgba(232,85,58,.5)}
.btn-primary:hover{box-shadow:0 14px 34px -8px rgba(54,114,224,.55)}
.btn-ghost{background:rgba(255,255,255,.06); color:var(--ink-100); border:1px solid var(--line)}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn-gold{background:var(--gold); color:#241a05}
.btn-sm{padding:9px 16px; font-size:12px; border-radius:999px}
.btn-block{width:100%; justify-content:center}
.btn[disabled]{opacity:.4; cursor:not-allowed}
.field{margin-bottom:16px; text-align:left}
.field label{display:block; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-500); margin-bottom:7px}
.field input,.field select{width:100%; background:var(--navy-800); border:1px solid var(--line); color:var(--ink-100); padding:13px 14px; border-radius:var(--radius-sm); font-size:15px; font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--wave-blue)}
.score-input{width:54px !important; text-align:center; font-family:var(--font-mono); font-size:20px !important; font-weight:700; padding:10px 4px !important}
.error-msg{color:var(--wave-red); font-size:13px; margin-top:8px; min-height:18px}
.hint{color:var(--ink-500); font-size:12.5px; line-height:1.5}

/* ---------- nav ---------- */
.topnav{position:sticky; top:0; z-index:50; backdrop-filter:blur(14px); background:rgba(8,11,20,.78); border-bottom:1px solid var(--line)}
.topnav-inner{max-width:1080px; margin:0 auto; padding:0 16px; display:flex; align-items:center; gap:4px; overflow-x:auto; scrollbar-width:none}
.topnav-inner::-webkit-scrollbar{display:none}
.brand{font-family:var(--font-display); font-size:20px; letter-spacing:.02em; padding:14px 14px 14px 0; white-space:nowrap; display:flex; align-items:center; gap:8px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--wave-red); box-shadow:6px 0 0 var(--wave-green), 12px 0 0 var(--wave-blue)}
.navtabs{display:flex; gap:2px; margin-left:auto}
.navtab{padding:18px 14px; font-size:13px; font-weight:600; color:var(--ink-500); white-space:nowrap; cursor:pointer; border-bottom:2px solid transparent; transition:color .15s ease}
.navtab:hover{color:var(--ink-100)}
.navtab.active{color:var(--ink-100); border-bottom-color:var(--wave-red)}
.navtab .ico{margin-right:6px}
.nav-avatar{margin-left:8px; flex:0 0 auto; cursor:pointer; border-radius:50%; overflow:hidden; width:36px; height:36px; border:2px solid var(--line)}
.nav-avatar svg{display:block; width:100%; height:100%}

/* ---------- generic section/card ---------- */
.section{padding:46px 0}
.section-head{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; margin-bottom:24px; flex-wrap:wrap}
.section-head h2{font-size:clamp(26px,4vw,38px)}
.section-head .sub{color:var(--ink-500); font-size:13.5px; margin-top:4px}
.card{background:linear-gradient(180deg,var(--navy-800),var(--navy-900)); border:1px solid var(--line); border-radius:var(--radius-lg); box-shadow:var(--shadow-deep)}
.pill{display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.06); border:1px solid var(--line); padding:5px 12px; border-radius:999px; font-size:11.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-300)}
.pill.live{background:rgba(232,85,58,.15); border-color:var(--wave-red); color:#ffb3a0}
.pill.live .blip{width:7px;height:7px;border-radius:50%;background:var(--wave-red); animation:blip 1.4s ease-in-out infinite}
.pill.finished{background:rgba(47,169,104,.13); border-color:var(--wave-green); color:#9be7c1}
.pill.locked{background:rgba(255,255,255,.04); color:var(--ink-500)}
@keyframes blip{0%,100%{opacity:1}50%{opacity:.25}}

/* ---------- match card ---------- */
.match-grid{display:grid; gap:14px}
.match-card{padding:18px 20px; display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center}
.match-meta{display:flex; align-items:center; gap:10px; font-size:11.5px; color:var(--ink-500); margin-bottom:12px; flex-wrap:wrap}
.match-teams{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px}
.team{display:flex; align-items:center; gap:10px; min-width:0}
.team.away{flex-direction:row-reverse; text-align:right}
.badge{flex:0 0 auto; width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-weight:700; font-size:11px; color:#fff; box-shadow:inset 0 0 0 2px rgba(255,255,255,.25)}
.badge.flagbadge{position:relative; overflow:hidden}
.badge.flagbadge .badge-code{position:relative; z-index:1}
.badge.flagbadge img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2}
.team-name{font-weight:700; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.vs-block{text-align:center; min-width:90px}
.vs-block .kickoff{font-family:var(--font-mono); font-size:12px; color:var(--ink-500)}
.vs-score{font-family:var(--font-mono); font-size:26px; font-weight:700; letter-spacing:.06em}
.predict-row{display:flex; align-items:center; justify-content:center; gap:10px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--line)}
.predict-row .x{color:var(--ink-500); font-family:var(--font-mono)}
.points-tag{font-family:var(--font-mono); font-weight:700; font-size:12px; padding:4px 9px; border-radius:7px}
.points-tag.p-exact{background:rgba(47,169,104,.2); color:#7fe3ad}
.points-tag.p-result{background:rgba(244,183,63,.18); color:var(--gold)}
.points-tag.p-zero{background:rgba(255,255,255,.05); color:var(--ink-600)}
.others-list{margin-top:12px; padding-top:12px; border-top:1px dashed var(--line); display:flex; flex-wrap:wrap; gap:8px}
.other-pred{display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.04); padding:5px 10px 5px 5px; border-radius:999px; font-size:12px}
.other-pred .av{width:22px;height:22px;border-radius:50%; overflow:hidden}
.other-pred .av svg{width:100%;height:100%}
.waiting-note{font-size:12px; color:var(--ink-600); margin-top:10px; text-align:center}

/* ---------- countdown ---------- */
.countdown{display:flex; gap:6px; justify-content:center; font-family:var(--font-mono)}
.countdown .seg{background:var(--navy-700); border:1px solid var(--line); border-radius:8px; padding:6px 8px; min-width:42px; text-align:center}
.countdown .seg b{display:block; font-size:16px}
.countdown .seg span{font-size:8px; color:var(--ink-500); letter-spacing:.08em}

/* ---------- leaderboard ---------- */
.lb-row{display:grid; grid-template-columns:34px 1fr auto; align-items:center; gap:14px; padding:14px 18px; border-bottom:1px solid var(--line)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:var(--font-mono); font-weight:700; color:var(--ink-500); font-size:15px}
.lb-rank.gold{color:var(--gold)}
.lb-user{display:flex; align-items:center; gap:11px; min-width:0}
.lb-av{width:38px;height:38px;border-radius:50%; flex:0 0 auto; overflow:hidden; border:2px solid var(--line)}
.lb-av svg{display:block; width:100%; height:100%}
.lb-name{font-weight:700; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.lb-sub{font-size:11.5px; color:var(--ink-500)}
.lb-pts{font-family:var(--font-mono); font-weight:700; font-size:18px; text-align:right}
.lb-pts small{display:block; font-size:9px; color:var(--ink-500); font-weight:400; letter-spacing:.06em}
.crown{font-size:14px}
.tabs-inline{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap}
.tab-chip{padding:8px 16px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--ink-500); font-size:12.5px; font-weight:700; cursor:pointer}
.tab-chip.active{background:var(--ink-100); color:var(--navy-950); border-color:var(--ink-100)}

/* ---------- avatar builder ---------- */
.avatar-stage{display:flex; flex-direction:column; align-items:center; gap:18px}
.avatar-preview{width:148px; height:148px; border-radius:50%; overflow:hidden; border:3px solid var(--line); background:var(--navy-700); box-shadow:0 0 0 8px rgba(255,255,255,.02)}
.avatar-preview svg{width:100%; height:100%; display:block}
.swatch-row{display:flex; flex-wrap:wrap; gap:9px; justify-content:center}
.swatch{width:34px;height:34px;border-radius:50%; border:2px solid transparent; cursor:pointer; transition:transform .12s ease}
.swatch.active{border-color:var(--ink-100); transform:scale(1.12)}
.emoji-row{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:340px; margin:0 auto}
.emoji-btn{width:46px; height:46px; border-radius:14px; border:2px solid var(--line); background:var(--navy-800); font-size:24px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .12s ease, border-color .12s ease}
.emoji-btn:hover{transform:translateY(-2px)}
.emoji-btn.active{border-color:var(--gold); background:rgba(244,183,63,.12); transform:scale(1.08)}
.opt-btn{padding:9px 14px; border-radius:10px; border:1px solid var(--line); background:var(--navy-800); color:var(--ink-300); font-size:13px; cursor:pointer; font-weight:600}
.opt-btn.active{background:var(--ink-100); color:var(--navy-950); border-color:var(--ink-100)}
.opt-row{display:flex; flex-wrap:wrap; gap:8px; justify-content:center}
.builder-label{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-500); margin:18px 0 9px; text-align:center}

/* ---------- auth screen ---------- */
.auth-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1}
.auth-card{width:100%; max-width:420px; padding:36px 32px; text-align:center}
.auth-toggle{display:flex; gap:6px; background:var(--navy-900); padding:4px; border-radius:999px; margin:22px 0 22px}
.auth-toggle button{flex:1; padding:10px; border:none; border-radius:999px; background:transparent; color:var(--ink-500); font-weight:700; font-size:13px; cursor:pointer}
.auth-toggle button.active{background:var(--ink-100); color:var(--navy-950)}
.google-btn{background:#fff; color:#1f1f1f; gap:10px}
.google-btn:hover{background:#f3f3f3}
.auth-divider{display:flex; align-items:center; gap:12px; margin:18px 0; color:var(--ink-600); font-size:11.5px; text-transform:uppercase; letter-spacing:.08em}
.auth-divider::before,.auth-divider::after{content:""; flex:1; height:1px; background:var(--line)}

/* ---------- bonus cards ---------- */
.bonus-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px}
.bonus-card{padding:22px}
.bonus-card h3{font-size:17px; margin:0 0 4px; letter-spacing:0; text-transform:none; font-family:var(--font-body); font-weight:800}
.bonus-card .pts{color:var(--gold); font-family:var(--font-mono); font-size:12px}

/* ---------- profile / admin ---------- */
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin:20px 0}
.stat-box{padding:16px; text-align:center; border-radius:var(--radius-md)}
.stat-box .n{font-family:var(--font-mono); font-size:26px; font-weight:700; color:var(--gold)}
.stat-box .l{font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-500); margin-top:3px}
.day-group-label{font-family:var(--font-display); font-size:22px; margin:34px 0 14px; display:flex; align-items:center; gap:12px}
.day-group-label .line{flex:1; height:1px; background:var(--line)}
.empty-state{text-align:center; padding:50px 20px; color:var(--ink-500)}
.empty-state .e{font-size:36px; margin-bottom:10px}
.wrapped-box{margin-top:28px; padding-top:22px; border-top:1px dashed var(--line)}
.wrapped-preview{margin-top:16px; text-align:center}
.wrapped-preview canvas{width:100%; max-width:280px; border-radius:18px; border:1px solid var(--line); box-shadow:var(--shadow-deep)}
.bracket-scroll{overflow-x:auto; padding-bottom:14px; margin:0 -20px; padding-left:20px; padding-right:20px}
.bracket-grid{display:flex; gap:18px; min-width:max-content}
.bracket-col{width:188px; flex:0 0 auto; border-left:2px solid var(--col-accent,var(--line)); padding-left:12px}
.bracket-col-label{font-family:var(--font-display); font-size:15px; color:var(--ink-300); margin-bottom:12px; letter-spacing:.03em}
.bracket-col-matches{display:flex; flex-direction:column; gap:14px}
.bracket-slot{display:block; width:100%; text-align:left; background:var(--navy-800); border:1px solid var(--line); border-radius:12px; padding:8px 10px; cursor:pointer; transition:border-color .15s ease, transform .15s ease}
.bracket-slot:hover{border-color:var(--wave-blue); transform:translateY(-1px)}
.bslot-team{display:flex; align-items:center; gap:7px; padding:3px 0; font-size:11.5px; color:var(--ink-300)}
.bslot-team span{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.bslot-team b{font-size:13px; color:var(--ink-100)}
.bslot-team.winner{color:var(--ink-100); font-weight:700}
.bslot-team.winner b{color:var(--wave-green)}
.bslot-mypred{font-size:9.5px; color:var(--gold); margin-top:4px; font-family:var(--font-mono)}
.bslot-team.tbd{opacity:.55}
.bslot-team.tbd span{font-style:italic; font-size:10.5px}
.gstand-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin-bottom:10px}
.gstand-card{background:var(--navy-800); border:1px solid var(--line); border-radius:var(--radius-md); padding:12px 14px; overflow-x:auto}
.gstand-head{font-family:var(--font-display); font-size:15px; color:var(--ink-300); margin-bottom:8px}
.gstand-table{width:100%; border-collapse:collapse; font-size:11.5px}
.gstand-table th{color:var(--ink-600); font-weight:600; text-align:center; padding:3px 4px; font-size:9.5px; text-transform:uppercase}
.gstand-table td{padding:4px; text-align:center; color:var(--ink-300)}
.gstand-team{display:flex; align-items:center; gap:6px; text-align:left !important}
.gstand-team .badge{width:20px;height:20px;font-size:6.5px}
.gstand-team span{font-family:var(--font-mono)}
.gstand-table tr.gstand-clasificado td{color:var(--ink-100)}
.gstand-table tr.gstand-clasificado{background:rgba(47,169,104,.08)}
.gstand-table tr.gstand-eliminado{opacity:.4}
.gstand-table tr.gstand-pendiente{background:rgba(244,183,63,.05)}
.teams-board{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px}
.tboard-group{background:var(--navy-800); border:1px solid var(--line); border-radius:var(--radius-md); padding:14px}
.tboard-glabel{font-family:var(--font-display); font-size:14px; color:var(--ink-500); margin-bottom:10px; letter-spacing:.03em}
.tboard-flags{display:flex; flex-direction:column; gap:8px}
.tboard-flag{display:flex; align-items:center; gap:8px; position:relative; transition:opacity .2s ease}
.tboard-flag .badge{width:26px; height:26px; font-size:7px}
.tboard-name{font-family:var(--font-mono); font-size:11px; color:var(--ink-300); flex:1}
.tboard-flag.st-eliminado{opacity:.32; filter:grayscale(1)}
.tboard-flag.st-clasificado .badge{box-shadow:0 0 0 2px var(--wave-green), 0 0 10px rgba(47,169,104,.5)}
.tboard-check{color:var(--wave-green); font-weight:700; font-size:13px}
.tboard-x{color:var(--ink-600); font-weight:700; font-size:13px}
.tboard-legend{display:flex; gap:18px; flex-wrap:wrap; margin-top:16px; font-size:11.5px; color:var(--ink-500)}
.tboard-legend .dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px}
.dot-alive{background:var(--wave-green)}
.dot-pending{background:var(--ink-600)}
.dot-out{background:#444; opacity:.6}
.reveal-card{padding:30px 24px; text-align:center; margin-bottom:22px; border:1px solid var(--gold-dim); background:linear-gradient(160deg,rgba(244,183,63,.14),var(--navy-900)); animation:revealPop .6s cubic-bezier(.2,1.4,.4,1)}
.reveal-confetti-emoji{font-size:40px; animation:revealBounce 1.4s ease-in-out infinite}

.reveal-sub{color:var(--ink-300); font-size:13.5px; margin-top:4px}
@keyframes revealPop{0%{transform:scale(.7) translateY(20px); opacity:0}60%{transform:scale(1.04) translateY(-4px); opacity:1}100%{transform:scale(1) translateY(0)}}

.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(120%); background:var(--ink-100); color:var(--navy-950); padding:13px 22px; border-radius:999px; font-weight:700; font-size:13.5px; z-index:999; transition:transform .35s cubic-bezier(.2,.9,.3,1.2); box-shadow:var(--shadow-deep)}
.toast.show{transform:translateX(-50%) translateY(0)}
.fab-share{position:fixed; right:22px; bottom:26px; width:58px; height:58px; border-radius:50%; border:none; cursor:pointer; z-index:200; background:linear-gradient(135deg,var(--wave-green),#1fae6b); box-shadow:0 10px 26px -6px rgba(47,169,104,.55), 0 0 0 1px rgba(255,255,255,.08); display:flex; align-items:center; justify-content:center; transition:transform .15s ease, box-shadow .15s ease}

.fab-share:active{transform:scale(.95)}

}

// Patrón de cruces estándar de un grupo de 4 (round robin):
// Jornada1: 1v2, 3v4 · Jornada2: 1v3, 4v2 · Jornada3: 4v1, 2v3
const MD_PATTERN = [[[0,1],[2,3]], [[0,2],[3,1]], [[3,0],[1,2]]];

function buildGroupMatches(){
  const out = [];
  for(const g of Object.keys(GROUPS)){
    const teams = GROUPS[g];
    const dates = GROUP_DATES[g];
    MD_PATTERN.forEach((pairs, mdIdx)=>{
      pairs.forEach((pair, pIdx)=>{
        out.push({
          id:`G${g}-md${mdIdx+1}-${pIdx+1}`,
          phase:'group', group:g, round:`Jornada ${mdIdx+1} · Grupo ${g}`,
          date: dates[mdIdx], time: pIdx===0 ? '13:00' : '16:00',
          home: teams[pair[0]], away: teams[pair[1]],
          homeScore:null, awayScore:null, status:'SCHEDULED'
        });
      });
    });
  }
  return out;
}

// Fase eliminatoria: se anuncian los cruces reales conforme termina
// la fase de grupos (28 jun en adelante). Se generan como "por
// definir" — el panel de Admin los completa con Sync o a mano.
// Estructura OFICIAL de la eliminatoria del Mundial 2026 (FIFA), con el
// número de partido real (73-104) y de dónde sale cada equipo:
// W:'X'        -> ganador del Grupo X
// R:'X'        -> segundo lugar del Grupo X
// T:[lista]    -> el "mejor tercero" que le toque, entre esos grupos
// M:'73'       -> ganador del partido 73 (o L:'101' para el perdedor)
const KO_DEF = [
  // --- Dieciseisavos (Round of 32) ---
  {n:73, stage:'r32', dateHint:'28 jun', home:{R:'A'}, away:{R:'B'}},
  {n:74, stage:'r32', dateHint:'29 jun', home:{W:'E'}, away:{T:['A','B','C','D','F']}},

  {n:84, stage:'r32', dateHint:'2 jul',  home:{W:'H'}, away:{R:'J'}},
  {n:85, stage:'r32', dateHint:'2 jul',  home:{W:'B'}, away:{T:['E','F','G','I','J']}},
  {n:86, stage:'r32', dateHint:'3 jul',  home:{W:'J'}, away:{R:'H'}},
  {n:87, stage:'r32', dateHint:'3 jul',  home:{W:'K'}, away:{T:['D','E','I','J','L']}},
  {n:88, stage:'r32', dateHint:'3 jul',  home:{R:'D'}, away:{R:'G'}},
  // --- Octavos (Round of 16) ---
  {n:89, stage:'r16', dateHint:'4 jul', home:{M:74}, away:{M:77}},
  {n:90, stage:'r16', dateHint:'4 jul', home:{M:73}, away:{M:75}},

  // --- Cuartos ---
  {n:97,  stage:'qf', dateHint:'9 jul',  home:{M:89}, away:{M:90}},

const KO_STAGE_LABEL = {r32:'Dieciseisavos de Final', r16:'Octavos de Final', qf:'Cuartos de Final', sf:'Semifinal', p3:'Tercer Lugar', final:'GRAN FINAL'};
function sourceLabel(src){
  if(!src) return '?';
  if(src.W) return `1° Grupo ${src.W}`;
  if(src.R) return `2° Grupo ${src.R}`;
  if(src.T) return `Mejor 3° (${src.T.join('/')})`;
  if(src.M) return `Ganador Partido ${src.M}`;
  if(src.L) return `Perdedor Partido ${src.L}`;
  return '?';
}
function buildKnockoutMatches(){
  return KO_DEF.map(d=>({
    id:`M${d.n}`, n:d.n, phase:'knockout', group:null, stage:d.stage,
    round: KO_STAGE_LABEL[d.stage] + (d.stage==='r32'||d.stage==='r16'||d.stage==='qf' ? ` · Partido ${d.n}` : ''),
    date:null, time:null, dateHint:d.dateHint,
    homeSrc:d.home, awaySrc:d.away,
    home:null, away:null, homeScore:null, awayScore:null, status:'PENDING_BRACKET'
  }));
}

const ALL_MATCHES_SEED = [...buildGroupMatches(), ...buildKnockoutMatches()];

/* ============================================================
   AVATAR INTERNO — animalitos estilo Mundial, 100% generado en
   SVG (el emoji se dibuja como texto, sin imágenes externas).
   Config compacta {animal,jersey,accessory} se guarda en
   Firestore y se renderiza igual en todos lados.
   ============================================================ */
const AVATAR_OPTS = {
  animal: ['🦁','🐯','🐻','🐼','🦊','🐺','🦝','🐨','🐵','🐶','🐱','🐰','🐸','🐧','🦅','🐙','🦈','🐢','🦓','🐘'],
  jersey: ['#e8553a','#2fa968','#3672e0','#f4b73f','#9b59d0','#1c2540','#ff6fa3','#1aa5b0'],
  accessory:['ninguno','estrella','banda','balon']
};
function defaultAvatar(){
  return { animal:AVATAR_OPTS.animal[0], jersey:AVATAR_OPTS.jersey[0], accessory:'ninguno' };
}
function svgAccessory(cfg){
  switch(cfg.accessory){
    case 'estrella': return `<text x="49" y="18" font-size="15" text-anchor="middle">⭐</text>`;
    case 'banda': return `<rect x="6" y="46" width="52" height="9" fill="#fff" opacity=".92"/><rect x="6" y="46" width="52" height="3" fill="${cfg.jersey}"/>`;
    case 'balon': return `<text x="50" y="54" font-size="16" text-anchor="middle">⚽</text>`;
    default: return '';
  }
}
function avatarSVG(cfg, size=64, rank=null){
  cfg = Object.assign(defaultAvatar(), cfg||{});
  const animal = cfg.animal || (cfg.face ? '🦁' : AVATAR_OPTS.animal[0]); // respaldo si viene un avatar viejo
  const uid = `${size}-${animal.codePointAt(0)}-${rank||0}`;
  let ring = '';
  let crown = '';
  if(rank===1){
    ring = `<circle cx="32" cy="32" r="30.5" fill="none" stroke="url(#rgGold${uid})" stroke-width="3"/>`;
    crown = `<text x="32" y="9" font-size="15" text-anchor="middle">👑</text>`;
  } else if(rank===2){
    ring = `<circle cx="32" cy="32" r="30.5" fill="none" stroke="#cfd6e6" stroke-width="2.5"/>`;
  } else if(rank===3){
    ring = `<circle cx="32" cy="32" r="30.5" fill="none" stroke="#cd8a52" stroke-width="2.5"/>`;
  }
  return `<svg viewBox="0 0 64 64" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="g${uid}" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="${cfg.jersey}" stop-opacity=".55"/>
        <stop offset="100%" stop-color="${cfg.jersey}"/>
      </radialGradient>
      <linearGradient id="rgGold${uid}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#f4b73f"/><stop offset="100%" stop-color="#e8553a"/>
      </linearGradient>
    </defs>
    <circle cx="32" cy="32" r="32" fill="url(#g${uid})"/>
    <circle cx="32" cy="32" r="29.5" fill="none" stroke="#fff" stroke-opacity=".18" stroke-width="1.5"/>
    <text x="32" y="43" font-size="34" text-anchor="middle">${animal}</text>
    ${svgAccessory(cfg)}
    ${ring}
    ${crown}
  </svg>`;
}
function randomAnimalAvatar(){
  const animal = AVATAR_OPTS.animal[Math.floor(Math.random()*AVATAR_OPTS.animal.length)];

  const jersey = AVATAR_OPTS.jersey[Math.floor(Math.random()*AVATAR_OPTS.jersey.length)];
  return { animal, jersey, accessory:'ninguno' };
}

/* ============================================================
   "WRAPPED" — tarjeta resumen descargable, dibujada en canvas
   (sin librerías externas: el avatar SVG se convierte a imagen
   con un data URL y se compone a mano junto con el texto).
   ============================================================ */
function svgToImage(svgString){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    img.onload = ()=>resolve(img);
    img.onerror = reject;
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgString)));
  });
}
function wrappedStats(uid){
  const gb = computeGeneralBoard();
  const idx = gb.findIndex(r=>r.uid===uid);
  const mine = gb[idx] || {total:0, daysWon:0};
  const myPreds = Object.values(state.predictions).filter(p=>p.uid===uid);
  let exact=0, result=0, withResult=0;
  const teamVotes = {};
  myPreds.forEach(p=>{
    const m = state.matches[p.matchId]; if(!m) return;
    if(m.home && m.away){
      const fav = p.homeScore>p.awayScore ? m.home : (p.awayScore>p.homeScore ? m.away : null);
      if(fav) teamVotes[fav] = (teamVotes[fav]||0)+1;
    }
    if(m.homeScore===null || m.homeScore===undefined) return;
    withResult++;
    const pts = scoreFor(p, m);
    if(pts===CONFIG.SCORE_EXACT) exact++;
    else if(pts===CONFIG.SCORE_RESULT) result++;
  });
  const favTeam = Object.entries(teamVotes).sort((a,b)=>b[1]-a[1])[0];
  return {
    rank: idx===-1?null:idx+1, total: mine.total, daysWon: mine.daysWon,
    predsCount: myPreds.length, exact, result, withResult,
    accuracy: withResult ? Math.round((exact+result)/withResult*100) : 0,
    favTeam: favTeam ? favTeam[0] : null
  };
}

  }

  // wave divider
  ctx.strokeStyle = '#e8553a'; ctx.lineWidth=3; ctx.beginPath();
  for(let x=0;x<=W;x+=8){ const y=950+Math.sin(x/40)*10; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke();
  ctx.strokeStyle = '#2fa968'; ctx.beginPath();
  for(let x=0;x<=W;x+=8){ const y=966+Math.sin(x/40+1)*10; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke();
  ctx.strokeStyle = '#3672e0'; ctx.beginPath();
  for(let x=0;x<=W;x+=8){ const y=982+Math.sin(x/40+2)*10; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke();

  ctx.fillStyle = '#646e8f'; ctx.font = '13px monospace';
  ctx.fillText('Canadá · México · Estados Unidos 2026', W/2, 1080);

function $(sel, root=document){ return root.querySelector(sel); }
function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDateLong(dateStr){
  if(!dateStr) return 'Por definir';
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('es-MX', {weekday:'long', day:'numeric', month:'long'});
}
function fmtDateShort(dateStr){
  if(!dateStr) return '—';
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('es-MX', {day:'numeric', month:'short'});
}
function kickoffMs(match){
  if(!match.date) return null;
  return new Date(`${match.date}T${match.time||'12:00'}:00`).getTime();
}
function lockMs(match){
  const k = kickoffMs(match);
  if(k===null) return null;
  return k - CONFIG.LOCK_MINUTES_BEFORE*60000;
}
function isLocked(match){
  const l = lockMs(match);
  if(l===null) return true; // sin fecha = bloqueado hasta que se defina
  return Date.now() >= l;
}
function teamBadge(code, size=42){

    <span class="badge-code">${code}</span>
    <img src="https://flagcdn.com/w80/${t.iso}.png" alt="" loading="lazy" onerror="this.remove()">
  </div>`;
}

/* ============================================================
   CONFETI — canvas ligero, sin librerías externas
   ============================================================ */
const CONFETTI_COLORS = ['#e8553a','#2fa968','#3672e0','#f4b73f','#ff6fa3'];
function confettiBurst(durationMs=2400, count=110){
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:9999';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
  resize();
  const pieces = Array.from({length:count}, ()=>({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.4,
    vx: (Math.random()-.5)*2.4,
    vy: 2 + Math.random()*3.2,
    size: 5 + Math.random()*6,
    rot: Math.random()*360,
    vrot: (Math.random()-.5)*14,
    color: CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)],
    shape: Math.random()<.5?'rect':'circle'
  }));
  const start = performance.now();
  function frame(now){
    const elapsed = now-start;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.vy += 0.045; p.rot += p.vrot;
      ctx.save();
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - elapsed/durationMs);
      if(p.shape==='rect') ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*0.62);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    if(elapsed < durationMs){ requestAnimationFrame(frame); }
    else { canvas.remove(); }
  }
  requestAnimationFrame(frame);
  window.addEventListener('resize', resize, {once:true});
}

// Marca cosas como "ya vistas" en este navegador, para no repetir
// la celebración cada vez que se recarga la página.
function seenSet(key){
  try{ return new Set(JSON.parse(localStorage.getItem(key)||'[]')); }catch(e){ return new Set(); }
}
function markSeen(key, id){
  const s = seenSet(key); s.add(id);
  try{ localStorage.setItem(key, JSON.stringify([...s])); }catch(e){}
}

function scoreFor(pred, match){
  if(match.homeScore===null || match.homeScore===undefined || !pred) return null;
  if(pred.homeScore===match.homeScore && pred.awayScore===match.awayScore) return CONFIG.SCORE_EXACT;
  const realRes = Math.sign(match.homeScore - match.awayScore);
  const predRes = Math.sign(pred.homeScore - pred.awayScore);
  if(realRes===predRes) return CONFIG.SCORE_RESULT;
  return CONFIG.SCORE_ZERO;
}

/* ---------- tarjeta de partido reutilizable ---------- */
function countdownParts(ms){
  if(ms<=0) return null;
  const s = Math.floor(ms/1000);
  const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
  return {d,h,m};
}
function renderMatchCard(m){
  const locked = isLocked(m);
  const {home:rh, away:ra} = resolveMatchTeams(m);
  const myPred = state.user ? predFor(m.id, state.user.uid) : null;
  const hasResult = m.homeScore!==null && m.homeScore!==undefined;
  const pts = hasResult ? scoreFor(myPred, m) : null;

  let statusPill = `<span class="pill locked">🔒 Por jugar</span>`;
  if(m.status==='LIVE') statusPill = `<span class="pill live"><span class="blip"></span> En vivo</span>`;
  else if(hasResult) statusPill = `<span class="pill finished">✓ Finalizado</span>`;
  else if(!locked) statusPill = `<span class="pill">⏳ Abierto</span>`;

  const cd = (!locked && m.date) ? countdownParts(lockMs(m)-Date.now()) : null;

  const scoreOrCountdown = hasResult
    ? `<div class="vs-score">${m.homeScore} – ${m.awayScore}</div>`
    : (m.date ? `<div class="countdown">
        ${cd ? `<div class="seg"><b>${cd.d}</b><span>DÍAS</span></div><div class="seg"><b>${cd.h}</b><span>HRS</span></div><div class="seg"><b>${cd.m}</b><span>MIN</span></div>` : `<div class="kickoff">En curso</div>`}
       </div><div class="kickoff" style="margin-top:6px">Cierra: ${fmtDateShort(m.date)} · ${m.time||''}</div>`
      : `<div class="kickoff">📌 ${m.dateHint||'Fecha por definir'}</div>`);

  let predictArea = '';
  if(!rh || !ra){
    predictArea = `<div class="waiting-note">Se define con los resultados de la fase de grupos</div>`;
  } else if(!state.user){
    predictArea = '';
  } else if(locked){
    if(myPred){
      const tagClass = pts===CONFIG.SCORE_EXACT?'p-exact':(pts===CONFIG.SCORE_RESULT?'p-result':'p-zero');
      predictArea = `<div class="predict-row">
        <span class="hint">Pronosticaste</span>
        <strong class="mono">${myPred.homeScore}-${myPred.awayScore}</strong>
        ${hasResult ? `<span class="points-tag ${tagClass}" ${pts===CONFIG.SCORE_EXACT?`data-exact-match="${m.id}"`:''}>${pts===null?'':'+'+pts+' pts'}</span>` : `<span class="hint">esperando resultado…</span>`}
      </div>`;
    } else {
      predictArea = `<div class="predict-row"><span class="hint">No enviaste pronóstico para este partido 😬</span></div>`;
    }
    if(hasResult){
      const others = allUids().filter(u=>u!==(state.user&&state.user.uid)).map(uid=>{
        const p = predFor(m.id, uid);
        if(!p) return '';
        const u = state.users[uid]; if(!u) return '';
        const pp = scoreFor(p, m);
        return `<div class="other-pred"><span class="av">${avatarSVG(u.avatar,22)}</span> ${u.displayName}: <b class="mono">${p.homeScore}-${p.awayScore}</b> <span style="color:${pp===CONFIG.SCORE_EXACT?'#7fe3ad':pp===CONFIG.SCORE_RESULT?'var(--gold)':'var(--ink-600)'}">(${pp}p)</span></div>`;
      }).filter(Boolean).join('');
      if(others) predictArea += `<div class="others-list">${others}</div>`;
    }
  } else {
    const sentCount = allUids().filter(u=>predFor(m.id,u)).length;
    predictArea = `<div class="predict-row">
      <input type="number" min="0" max="30" class="score-input" data-pred-home="${m.id}" value="${myPred?myPred.homeScore:''}" placeholder="0">
      <span class="x">–</span>
      <input type="number" min="0" max="30" class="score-input" data-pred-away="${m.id}" value="${myPred?myPred.awayScore:''}" placeholder="0">
      <button class="btn btn-primary btn-sm" data-send-pred="${m.id}">${myPred?'Actualizar':'Enviar'}</button>
    </div>
    <div class="waiting-note">${sentCount} amigo${sentCount===1?'':'s'} ya enviaron su pronóstico (oculto hasta el cierre) · se cierra ${CONFIG.LOCK_MINUTES_BEFORE} min antes del silbatazo</div>`;
  }

  return `<div class="card match-card">
    <div>
      <div class="match-meta"><span>${m.round}</span> ${statusPill}</div>
      <div class="match-teams">
        <div class="team">${teamBadge(rh)}<span class="team-name">${rh?teamName(rh):(m.homeSrc?sourceLabel(m.homeSrc):'Por definir')}</span></div>
        <div class="vs-block">${scoreOrCountdown}</div>
        <div class="team away">${teamBadge(ra)}<span class="team-name">${ra?teamName(ra):(m.awaySrc?sourceLabel(m.awaySrc):'Por definir')}</span></div>
      </div>
      ${predictArea}
    </div>
  </div>`;
}

function bindMatchCardEvents(root=document){
  $$('[data-send-pred]', root).forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.sendPred;
      const h = parseInt($(`[data-pred-home="${id}"]`).value, 10);
      const a = parseInt($(`[data-pred-away="${id}"]`).value, 10);
      submitPrediction(id, h, a);
    });

    const seenKey = `qm26_seen_exact_${state.user.uid}`;
    const seen = seenSet(seenKey);
    $$('[data-exact-match]', root).forEach(el=>{
      const mid = el.dataset.exactMatch;
      if(!seen.has(mid)){

        markSeen(seenKey, mid);
      }
    });
  }
}

function friendlyAuthError(err){
  const code = (err && err.code) || '';
  if(code.includes('email-already-in-use')) return 'Ese correo ya tiene cuenta. Mejor entra.';
  if(code.includes('invalid-credential') || code.includes('wrong-password') || code.includes('user-not-found')) return 'Correo o contraseña incorrectos.';
  if(code.includes('weak-password')) return 'La contraseña necesita al menos 6 caracteres.';
  if(code.includes('invalid-email')) return 'Ese correo no es válido.';
  if(code.includes('popup-closed-by-user')) return 'Cerraste la ventana de Google antes de terminar.';
  if(code.includes('popup-blocked')) return 'Tu navegador bloqueó la ventana emergente de Google — permítela e intenta de nuevo.';
  if(code.includes('unauthorized-domain')) return 'Este dominio aún no está autorizado en Firebase (Authentication → Settings → Authorized domains).';
  if(code.includes('account-exists-with-different-credential')) return 'Ese correo ya tiene cuenta creada con contraseña — entra con correo y contraseña.';
  return 'Algo salió mal: ' + (err.message || err);
}

function codeFromApiName(n){ return API_NAME_TO_CODE[n] || null; }

async function adminSyncFromApi(){
  if(CONFIG.FOOTBALL_DATA_TOKEN === 'REEMPLAZA_CON_TU_TOKEN'){
    toast('Falta configurar tu token de football-data.org'); return;
  }
  toast('Sincronizando con football-data.org…');
  try{
    const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches', {
      headers:{ 'X-Auth-Token': CONFIG.FOOTBALL_DATA_TOKEN }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const apiMatches = data.matches || [];
    let updated = 0;
    const b = writeBatch(db);
    apiMatches.forEach(am=>{
      const homeCode = codeFromApiName(am.homeTeam && am.homeTeam.name);
      const awayCode = codeFromApiName(am.awayTeam && am.awayTeam.name);
      if(!homeCode || !awayCode) return;
      // buscar el partido local por equipos (fase de grupos)
      const local = matchList().find(m=> m.phase==='group' && m.home===homeCode && m.away===awayCode);
      if(!local) return;
      const finished = am.status==='FINISHED';
      const live = am.status==='IN_PLAY' || am.status==='PAUSED';
      const fields = {};
      if(finished || live){
        if(am.score && am.score.fullTime){
          fields.homeScore = am.score.fullTime.home;
          fields.awayScore = am.score.fullTime.away;
        }
      }
      // hora real del partido (la API la da en UTC) convertida a la
      // hora local de quien le dio clic a "Sincronizar"
      if(am.utcDate){
        const d = new Date(am.utcDate);
        if(!isNaN(d)){
          fields.date = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
          fields.time = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
        }
      }
      fields.status = finished ? 'FINISHED' : (live ? 'LIVE' : 'SCHEDULED');
      b.set(doc(db,'matches',local.id), fields, {merge:true});
      updated++;
    });
    if(updated>0) await b.commit();
    toast(`Sincronizado: ${updated} partidos actualizados ✓`);
  }catch(e){
    console.error(e);
    toast('No se pudo sincronizar (revisa tu token / consola)');
  }
}

    snap.forEach(d=>{ state.matches[d.id] = Object.assign({}, seedById[d.id]||{}, d.data(), {id:d.id}); });
    _thirdAssignCache = null;
    render();
  }, err=>console.warn('matches listener', err)));

  unsubs.push(onSnapshot(collection(db,'predictions'), snap=>{
    snap.docChanges().forEach(ch=>{
      const id = ch.doc.id;
      if(ch.type==='removed'){ delete state.predictions[id]; }
      else { state.predictions[id] = ch.doc.data(); }
    });
    render();
  }, err=>console.warn('predictions listener', err)));

  unsubs.push(onSnapshot(collection(db,'users'), snap=>{
    snap.forEach(d=>{ state.users[d.id] = d.data(); });
    render();
  }, err=>console.warn('users listener', err)));

  unsubs.push(onSnapshot(collection(db,'bonus'), snap=>{
    snap.forEach(d=>{ state.bonus[d.id] = d.data(); });
    render();
  }, err=>console.warn('bonus listener', err)));

  unsubs.push(onSnapshot(doc(db,'meta','bonusResults'), d=>{
    state.bonusResults = d.exists() ? d.data() : null;
    render();
  }, err=>console.warn('bonusResults listener', err)));
}

/* ---- motor de cálculo: puntos diarios y generales ---- */
function matchList(){ return Object.values(state.matches); }

/* ============================================================
   TABLAS DE GRUPO + ESTADO DE EQUIPOS (clasificado/eliminado)
   Nota: usa criterio simplificado de desempate (puntos, luego
   diferencia de gol, luego goles a favor) — no replica el 100%
   de las reglas oficiales de FIFA para casos raros de empate
   triple, pero es más que suficiente para la quiniela.
   ============================================================ */
function computeGroupStandings(g){
  const teams = GROUPS[g].map(code=>({code, pts:0, gf:0, ga:0, played:0}));
  const byCode = Object.fromEntries(teams.map(t=>[t.code,t]));
  matchList().filter(m=>m.phase==='group' && m.group===g).forEach(m=>{
    if(m.homeScore===null || m.homeScore===undefined) return;
    const h = byCode[m.home], a = byCode[m.away];
    h.played++; a.played++;
    h.gf += m.homeScore; h.ga += m.awayScore;
    a.gf += m.awayScore; a.ga += m.homeScore;
    if(m.homeScore>m.awayScore){ h.pts+=3; } else if(m.homeScore<m.awayScore){ a.pts+=3; } else { h.pts+=1; a.pts+=1; }
  });
  teams.forEach(t=>t.gd = t.gf-t.ga);
  teams.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
  return teams;
}
function groupComplete(g){
  return matchList().filter(m=>m.phase==='group' && m.group===g)
    .every(m=>m.homeScore!==null && m.homeScore!==undefined);
}
// 'clasificado' | 'eliminado' | 'pendiente' | 'en_juego'
function allGroupsComplete(){ return Object.keys(GROUPS).every(groupComplete); }
function bestThirds(){
  // [{group, code, pts, gd, gf}] de los 12 terceros lugares, ordenados;
  // solo tiene sentido completo cuando allGroupsComplete() es true.
  return Object.keys(GROUPS).map(gr=>{
    const st = computeGroupStandings(gr);
    return Object.assign({group:gr}, st[2]);
  }).sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
}
function teamStatus(code){
  const g = Object.keys(GROUPS).find(k=>GROUPS[k].includes(code));
  if(!g) return 'en_juego';
  if(!groupComplete(g)) return 'en_juego';
  const standings = computeGroupStandings(g);
  const pos = standings.findIndex(t=>t.code===code);
  if(pos===0 || pos===1) return 'clasificado';
  if(pos===3) return 'eliminado';
  // pos===2 (tercer lugar): depende de si está entre los 8 mejores
  // terceros de todos los grupos — solo se sabe cuando TODOS los
  // grupos terminan.
  if(!allGroupsComplete()) return 'pendiente';
  const bestEight = bestThirds().slice(0,8).map(t=>t.group);
  return bestEight.includes(g) ? 'clasificado' : 'eliminado';
}

/* ============================================================
   RESOLUCIÓN DEL BRACKET — a quién le toca jugar contra quién,
   calculado en vivo a partir de las tablas de grupo reales.
   ============================================================ */
// matchId ('M73'..'M88' con T:[...]) -> grupo que le toca ese slot
// de "mejor tercero", calculado con la tabla oficial de FIFA
// (8 grupos avanzan, cada slot acepta un subconjunto fijo).
let _thirdAssignCache = null;
function thirdPlaceAssignment(){
  if(_thirdAssignCache) return _thirdAssignCache;
  if(!allGroupsComplete()) return {};
  const bestEight = new Set(bestThirds().slice(0,8).map(t=>t.group));
  const slots = KO_DEF.filter(d=>d.away && d.away.T).map(d=>({id:`M${d.n}`, eligible: d.away.T.filter(g=>bestEight.has(g))}));
  // Emparejamiento bipartito por caminos de aumento (Kuhn): garantiza
  // encontrar la asignación completa si existe una — probado contra
  // las 495 combinaciones posibles de "8 de 12 grupos", sin fallos.
  const slotOfGroup = {};
  function tryAssign(slot, visited){
    for(const g of slot.eligible){
      if(visited.has(g)) continue;
      visited.add(g);
      if(!(g in slotOfGroup) || tryAssign(slots.find(s=>s.id===slotOfGroup[g]), visited)){
        slotOfGroup[g] = slot.id;
        return true;
      }
    }
    return false;
  }
  slots.slice().sort((a,b)=>a.eligible.length-b.eligible.length).forEach(slot=>tryAssign(slot, new Set()));
  const assignment = {};
  Object.entries(slotOfGroup).forEach(([g,slotId])=>{ assignment[slotId] = g; });
  _thirdAssignCache = assignment;
  return assignment;
}
function resolveSlot(src, matchId){
  if(!src) return null;
  if(src.W) return groupComplete(src.W) ? computeGroupStandings(src.W)[0].code : null;
  if(src.R) return groupComplete(src.R) ? computeGroupStandings(src.R)[1].code : null;
  if(src.T){
    const assign = thirdPlaceAssignment();
    const g = assign[matchId];
    return g ? computeGroupStandings(g)[2].code : null;
  }
  if(src.M){
    const m = state.matches[`M${src.M}`];
    if(!m || m.homeScore===null || m.homeScore===undefined) return null;
    const t = resolveMatchTeams(m);
    return m.homeScore>m.awayScore ? t.home : (m.awayScore>m.homeScore ? t.away : null);
  }
  if(src.L){
    const m = state.matches[`M${src.L}`];
    if(!m || m.homeScore===null || m.homeScore===undefined) return null;
    const t = resolveMatchTeams(m);
    return m.homeScore>m.awayScore ? t.away : (m.awayScore>m.homeScore ? t.home : null);
  }
  return null;
}
function resolveMatchTeams(m){
  if(m.phase!=='knockout') return {home:m.home, away:m.away};
  return {
    home: m.home || resolveSlot(m.homeSrc, m.id),
    away: m.away || resolveSlot(m.awaySrc, m.id)
  };
}


function predFor(matchId, uid){ return state.predictions[`${matchId}__${uid}`] || null; }
function allUids(){ return Object.keys(state.users); }

function computeDailyBoards(){
  // fecha -> [{uid, pts}]
  const byDate = {};
  matchList().forEach(m=>{
    if(!m.date || m.homeScore===null || m.homeScore===undefined) return;
    byDate[m.date] = byDate[m.date] || {};
    allUids().forEach(uid=>{
      const p = predFor(m.id, uid);
      const pts = scoreFor(p, m);
      if(pts===null) return;
      byDate[m.date][uid] = (byDate[m.date][uid]||0) + pts;
    });
  });
  const days = Object.keys(byDate).sort();
  return days.map(date=>{
    const rows = Object.entries(byDate[date]).map(([uid,pts])=>({uid,pts}))
      .sort((a,b)=>b.pts-a.pts);
    const top = rows.length ? rows[0].pts : 0;
    const winners = rows.filter(r=>r.pts===top && top>0).map(r=>r.uid);
    return {date, rows, winners};
  });
}
function computeGeneralBoard(){
  const totals = {}; const daysWon = {};
  computeDailyBoards().forEach(day=>{
    day.rows.forEach(r=>{ totals[r.uid] = (totals[r.uid]||0) + r.pts; });
    day.winners.forEach(uid=>{ daysWon[uid] = (daysWon[uid]||0) + 1; });
  });
  // sumar bonos si ya hay resultados oficiales
  if(state.bonusResults){
    const br = state.bonusResults;
    Object.entries(state.bonus).forEach(([uid,pick])=>{
      let pts = 0;
      if(br.champion && pick.champion===br.champion) pts += CONFIG.BONUS_CHAMPION;
      if(br.runnerUp && pick.runnerUp===br.runnerUp) pts += CONFIG.BONUS_RUNNERUP;
      if(br.topScorer && pick.topScorer && pick.topScorer.trim().toLowerCase()===String(br.topScorer).trim().toLowerCase()) pts += CONFIG.BONUS_TOPSCORER;
      if(br.surprise && pick.surprise===br.surprise) pts += CONFIG.BONUS_SURPRISE;
      totals[uid] = (totals[uid]||0) + pts;
    });
  }
  allUids().forEach(uid=>{ if(!(uid in totals)) totals[uid]=0; if(!(uid in daysWon)) daysWon[uid]=0; });
  return Object.keys(totals).map(uid=>({uid, total:totals[uid], daysWon:daysWon[uid]||0}))
    .sort((a,b)=> b.total-a.total || b.daysWon-a.daysWon);
}
function myGeneralRank(){
  if(!state.user) return null;
  const i = computeGeneralBoard().findIndex(r=>r.uid===state.user.uid);
  return i===-1 ? null : i+1;
}

/* ============================================================
   COMPARTIR A WHATSAPP — clasificación del día más reciente
   ============================================================ */
const MEDALS = ['🥇','🥈','🥉'];
function buildDailyShareText(){
  const days = computeDailyBoards().slice().reverse();
  const latest = days[0];
  if(!latest){
    return `🏆 *${CONFIG.APP_NAME}* ⚽\n\nAún no hay resultados — ¡manden sus pronósticos! 👀`;
  }
  const lines = latest.rows.map((r,i)=>{
    const u = state.users[r.uid] || {displayName:'Jugador'};
    const medal = MEDALS[i] || `${i+1}.`;
    const crown = latest.winners.includes(r.uid) ? ' 👑' : '';
    return `${medal} ${i===0?'*':''}${u.displayName}${i===0?'*':''} — ${r.pts} pts${crown}`;
  }).join('\n');
  const noPlay = allUids().length - latest.rows.length;
  let msg = `🏆 *${CONFIG.APP_NAME}* ⚽\n📅 Resultados de ${fmtDateLong(latest.date)}\n\n`;
  msg += lines || 'Nadie sumó puntos hoy 😬';
  if(noPlay>0) msg += `\n\n${noPlay} no enviaron pronóstico hoy 👀`;
  msg += `\n\n¡A seguirle echando ganas! 🔥⚽`;
  return msg;
}
function shareTodayToWhatsApp(){
  const text = buildDailyShareText();
  const url = 'https://wa.me/?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener');
}

        <select id="adm-ko-select">${groupMatches.map(m=>{const t=resolveMatchTeams(m); return `<option value="${m.id}">${m.round}${t.home?` — ${teamName(t.home)} vs ${teamName(t.away||'')}`:''}</option>`;}).join('')}</select>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:end">
        <div class="field" style="margin-bottom:0; min-width:140px"><label>Equipo local</label><select id="adm-ko-home">${Object.entries(TEAMS).map(([c,t])=>`<option value="${c}">${t.name}</option>`).join('')}</select></div>
        <div class="field" style="margin-bottom:0; min-width:140px"><label>Equipo visita</label><select id="adm-ko-away">${Object.entries(TEAMS).map(([c,t])=>`<option value="${c}">${t.name}</option>`).join('')}</select></div>
        <div class="field" style="margin-bottom:0"><label>Fecha</label><input type="date" id="adm-ko-date"></div>
        <div class="field" style="margin-bottom:0"><label>Hora</label><input type="time" id="adm-ko-time" value="13:00"></div>
        <button class="btn btn-ghost btn-sm" id="adm-set-ko">Guardar cruce</button>
      </div>
    </div>

    <div class="card" style="padding:24px">
      <h3 style="font-family:var(--font-body); text-transform:none; letter-spacing:0">5. Resultados oficiales de bonos</h3>
      <p class="hint">Se reparten los puntos extra a quienes le atinaron.</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:end">
        <div class="field" style="margin-bottom:0; min-width:160px"><label>Campeón</label><select id="adm-br-champion"><option value="">—</option>${Object.entries(TEAMS).map(([c,t])=>`<option value="${c}">${t.name}</option>`).join('')}</select></div>
        <div class="field" style="margin-bottom:0; min-width:160px"><label>Subcampeón</label><select id="adm-br-runnerup"><option value="">—</option>${Object.entries(TEAMS).map(([c,t])=>`<option value="${c}">${t.name}</option>`).join('')}</select></div>
        <div class="field" style="margin-bottom:0; min-width:160px"><label>Goleador</label><input id="adm-br-scorer" placeholder="Nombre"></div>
        <div class="field" style="margin-bottom:0; min-width:160px"><label>Revelación</label><select id="adm-br-surprise"><option value="">—</option>${Object.entries(TEAMS).map(([c,t])=>`<option value="${c}">${t.name}</option>`).join('')}</select></div>
        <button class="btn btn-gold btn-sm" id="adm-set-bonus">Guardar resultados</button>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   EVENTOS por vista
   ============================================================ */
function bindViewEvents(){
  bindMatchCardEvents();
  $$('[data-goto]').forEach(b=>b.addEventListener('click', ()=>{ state.view=b.dataset.goto; render(); }));
  $$('[data-calf]').forEach(b=>b.addEventListener('click', ()=>{ state.calFilter=b.dataset.calf; render(); }));
  $$('[data-bracket-goto]').forEach(b=>b.addEventListener('click', ()=>{
    state.calFilter='eliminatoria'; state.view='calendario'; render();
  }));
  $$('[data-lbtab]').forEach(b=>b.addEventListener('click', ()=>{ state.lbTab=b.dataset.lbtab; render(); }));

  const revealCard = $('#reveal-card');
  if(revealCard && state.user){
    const days = computeDailyBoards().slice().reverse();
    const latest = days[0];
    if(latest){
      const seenKey = `qm26_seen_win_${state.user.uid}`;
      const seen = seenSet(seenKey);
      if(!seen.has(latest.date)){
        confettiBurst();
        markSeen(seenKey, latest.date);
      }
    }
  }

  if(state.view==='bonos'){
    const f = $('#bonus-form');
    if(f) $('#bonus-save').addEventListener('click', (e)=>{
      e.preventDefault();
      submitBonus({
        champion: $('#b-champion').value || null,
        runnerUp: $('#b-runnerup').value || null,
        topScorer: $('#b-scorer').value || null,
        surprise: $('#b-surprise').value || null,
      });
    });
  }

  if(state.view==='perfil'){
    bindAvatarBuilder('profile');
    $('#p-save-name').addEventListener('click', ()=>saveDisplayName($('#p-name').value));
    $('#p-save-avatar').addEventListener('click', ()=>saveAvatar(state.profileDraft));
    $('#p-logout').addEventListener('click', doLogout);
    $('#p-gen-wrapped').addEventListener('click', async ()=>{
      const btn = $('#p-gen-wrapped'); btn.disabled = true; btn.textContent = 'Generando…';
      try{
        const canvas = $('#wrapped-canvas');
        await drawWrappedCard(canvas, state.user.uid);
        $('#wrapped-preview').classList.remove('hidden');
        confettiBurst(1400, 60);
      }catch(e){ console.error(e); toast('No se pudo generar el wrapped'); }
      finally{ btn.disabled=false; btn.textContent='🎁 Generar mi Wrapped'; }
    });
    const dlBtn = $('#p-download-wrapped');
    if(dlBtn) dlBtn.addEventListener('click', ()=>{
      const canvas = $('#wrapped-canvas');
      const a = document.createElement('a');
      a.download = 'mi-wrapped-mundial-26.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  }

  if(state.view==='admin'){
    $('#adm-seed').addEventListener('click', adminSeedMatches);
    $('#adm-sync').addEventListener('click', adminSyncFromApi);
    $('#adm-set-score').addEventListener('click', ()=>{
      const id = $('#adm-match-select').value;
      const h = parseInt($('#adm-home-score').value,10), a = parseInt($('#adm-away-score').value,10);
      if(Number.isInteger(h) && Number.isInteger(a)) adminSetScore(id,h,a,'FINISHED');
      else toast('Pon un marcador válido');
    });
    const schedSel = $('#adm-sched-select');
    const fillSched = ()=>{
      const opt = schedSel.options[schedSel.selectedIndex];
      $('#adm-sched-date').value = (opt && opt.dataset.date) || '';
      $('#adm-sched-time').value = (opt && opt.dataset.time) || '';
    };
    if(schedSel){ fillSched(); schedSel.addEventListener('change', fillSched); }
    $('#adm-set-sched').addEventListener('click', ()=>{
      adminSetSchedule($('#adm-sched-select').value, $('#adm-sched-date').value, $('#adm-sched-time').value);
    });
    $('#adm-set-ko').addEventListener('click', ()=>{
      const id = $('#adm-ko-select').value;
      adminSetKnockoutTeams(id, $('#adm-ko-home').value, $('#adm-ko-away').value, $('#adm-ko-date').value||null, $('#adm-ko-time').value||null);
    });
    $('#adm-set-bonus').addEventListener('click', ()=>{
      adminSetBonusResults({
        champion: $('#adm-br-champion').value || null,
        runnerUp: $('#adm-br-runnerup').value || null,
        topScorer: $('#adm-br-scorer').value || null,
        surprise: $('#adm-br-surprise').value || null,
      });
    });
  }
}

/* ============================================================
   ESCENA 3D — balón Trionda en el héroe (Three.js)
   ============================================================ */
let heroState = null;
function buildTriondaTexture(){
  const c = document.createElement('canvas'); c.width=512; c.height=256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f4f4f0'; ctx.fillRect(0,0,512,256);
  const grad = ctx.createLinearGradient(0,0,512,256);
  grad.addColorStop(0,'#e8553a'); grad.addColorStop(.5,'#2fa968'); grad.addColorStop(1,'#3672e0');
  ctx.globalAlpha = .85;
  for(let i=0;i<6;i++){
    ctx.strokeStyle = i%3===0?'#e8553a':(i%3===1?'#2fa968':'#3672e0');
    ctx.lineWidth = 14;
    ctx.beginPath();
    for(let x=-50;x<=562;x+=10){
      const y = 128 + Math.sin((x/512)*Math.PI*2 + i*1.1)*70 + i*8 - 24;
      x===-50 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  return c;
}
function initHeroScene(){
  const canvas = document.getElementById('hero-canvas');
  if(!canvas || typeof THREE==='undefined') return;
  if(heroState && heroState.canvas===canvas) return; // ya iniciado para este nodo
  const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/canvas.clientHeight, .1, 100);
  camera.position.set(0,0,7);
  const tex = new THREE.CanvasTexture(buildTriondaTexture());
  const geo = new THREE.IcosahedronGeometry(2.1, 4);
  const mat = new THREE.MeshStandardMaterial({map:tex, roughness:.45, metalness:.08});
  const ball = new THREE.Mesh(geo, mat);
  scene.add(ball);
  scene.add(new THREE.AmbientLight(0xffffff,.65));
  const light1 = new THREE.PointLight(0xffffff,1.1); light1.position.set(5,4,6); scene.add(light1);
  const light2 = new THREE.PointLight(0x3672e0,.6); light2.position.set(-6,-3,-4); scene.add(light2);
  // partículas tipo confeti
  const starGeo = new THREE.BufferGeometry();
  const starCount = 140; const pos = new Float32Array(starCount*3);
  for(let i=0;i<starCount;i++){ pos[i*3]=(Math.random()-.5)*16; pos[i*3+1]=(Math.random()-.5)*9; pos[i*3+2]=(Math.random()-.5)*8-2; }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xf4b73f, size:.045, transparent:true, opacity:.7}));
  scene.add(stars);

  let mouseX=0, mouseY=0;
  function onResize(){
    const w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.setSize(w,h,false); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', onResize);
  window.addEventListener('mousemove', e=>{ mouseX=(e.clientX/innerWidth-.5); mouseY=(e.clientY/innerHeight-.5); });
  onResize();
  let raf;
  function animate(){
    raf = requestAnimationFrame(animate);
    ball.rotation.y += 0.0035; ball.rotation.x += 0.0009;
    ball.rotation.y += (mouseX*0.4-ball.rotation.y)*0.0; // suave: solo aporta inercia visual
    camera.position.x += (mouseX*1.1-camera.position.x)*0.04;
    camera.position.y += (-mouseY*0.8-camera.position.y)*0.04;
    camera.lookAt(0,0,0);
    stars.rotation.y += 0.0006;
    renderer.render(scene,camera);
  }
  animate();
  canvas.classList.add('ready');
  heroState = {canvas, raf};
}

/* ============================================================
   RENDER MAESTRO + ARRANQUE
   ============================================================ */
function render(){
  if(!FIREBASE_READY){ renderConfigNeeded(); return; }
  if(!state.user){ renderAuthScreen(); return; }
  renderShell();
}

function boot(){
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('loading').classList.add('hidden');
  if(!FIREBASE_READY){ render(); return; }
  onAuthStateChanged(auth, async (user)=>{
    state.user = user;
    if(user){
      state.isAdmin = CONFIG.ADMIN_UIDS.includes(user.uid);
      const snap = await getDoc(doc(db,'users',user.uid));
      if(snap.exists()) state.users[user.uid] = snap.data();
      startRealtimeListeners();
    } else {
      clearListeners();
    }
    render();
  });
}
boot();
